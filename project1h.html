<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Classroom Schedule Planner</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    color:#333;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.alert{
    margin-top:10px;
    padding:10px;
    border-radius:5px;
    display:none;
}

.success{
    background:#d4edda;
    color:#155724;
}

.error{
    background:#f8d7da;
    color:#721c24;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

table th{
    background:#007bff;
    color:white;
}
</style>
</head>
<body>

<div class="container">

<h1>Virtual Classroom Schedule Planner</h1>

<div class="card">

<h2>Create Session</h2>

<div class="form-group">
<label>Course Name</label>
<input type="text" id="course">
</div>

<div class="form-group">
<label>Instructor</label>
<input type="text" id="instructor">
</div>

<div class="form-group">
<label>Date</label>
<input type="date" id="date">
</div>

<div class="form-group">
<label>Start Time</label>
<input type="time" id="startTime">
</div>

<div class="form-group">
<label>End Time</label>
<input type="time" id="endTime">
</div>

<button onclick="addSession()">Add Session</button>

<div id="message" class="alert"></div>

</div>

<div class="card">

<h2>Scheduled Classes</h2>

<table>
<thead>
<tr>
<th>Course</th>
<th>Instructor</th>
<th>Date</th>
<th>Start</th>
<th>End</th>
</tr>
</thead>

<tbody id="scheduleBody"></tbody>

</table>

</div>

</div>

<script>

const schedules = [];

function showMessage(text,type){

    const msg = document.getElementById("message");

    msg.innerText = text;
    msg.className = "alert " + type;
    msg.style.display = "block";

    setTimeout(()=>{
        msg.style.display = "none";
    },3000);
}

function addSession(){

    const course =
        document.getElementById("course").value.trim();

    const instructor =
        document.getElementById("instructor").value.trim();

    const date =
        document.getElementById("date").value;

    const startTime =
        document.getElementById("startTime").value;

    const endTime =
        document.getElementById("endTime").value;

    if(!course || !instructor || !date ||
       !startTime || !endTime){

        showMessage(
            "Please fill all fields.",
            "error"
        );
        return;
    }

    if(startTime >= endTime){

        showMessage(
            "End time must be later than start time.",
            "error"
        );
        return;
    }

    // Conflict validation
    const conflict = schedules.some(item => {

        if(item.date !== date){
            return false;
        }

        return (
            startTime < item.endTime &&
            endTime > item.startTime
        );
    });

    if(conflict){

        showMessage(
            "Schedule conflict detected! Another class exists during this time slot.",
            "error"
        );
        return;
    }

    schedules.push({
        course,
        instructor,
        date,
        startTime,
        endTime
    });

    renderSchedule();

    showMessage(
        "Class scheduled successfully.",
        "success"
    );

    document.getElementById("course").value = "";
    document.getElementById("instructor").value = "";
    document.getElementById("date").value = "";
    document.getElementById("startTime").value = "";
    document.getElementById("endTime").value = "";
}

function renderSchedule(){

    const tbody =
        document.getElementById("scheduleBody");

    tbody.innerHTML = "";

    schedules
    .sort((a,b)=>
        (a.date+a.startTime)
        .localeCompare(b.date+b.startTime)
    )
    .forEach(item=>{

        const row = `
        <tr>
            <td>${item.course}</td>
            <td>${item.instructor}</td>
            <td>${item.date}</td>
            <td>${item.startTime}</td>
            <td>${item.endTime}</td>
        </tr>
        `;

        tbody.innerHTML += row;
    });
}

</script>

</body>
</html>
